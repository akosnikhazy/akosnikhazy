<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Nikházy Ákos</title>
    <style>
	html{
		background:#efefef;
	}
	div,a{
		margin:0 auto;
	}
      #image{
		background-image:url('akos-photography.jpg');
		 background-repeat: no-repeat;
		background-size: cover;
		width:200px;
		height:200px;
		box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px, rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
		border-radius: 1000px;
	  }
	  #name{
		text-align: center;
		font-size:1.5em;
		font-family: arial;
		font-weight:777;
		margin-top:15px;
		margin-bottom:30px;
		width:250px;
		padding:50px;
		border-radius: 15px;
		box-shadow: rgba(50, 50, 93, 0.25) 0px 6px 12px -2px, rgba(0, 0, 0, 0.3) 0px 3px 7px -3px;
	  }
	  #vcard{
		display:block;
		border-radius: 10px;
		background: #00660F;
		width: 140px;
		text-align:center;
		padding:25px;
		color: #fefefe;
		text-decoration:none;
	  }
	  #vcard:active,#vcard:hover{
	  background:#58cf39}
    </style>
    
  </head>
  
  <body>
    <div id="image"></div>
	<div id="name">Nikházy Ákos</div>
	<a href="vcard.vcf" id="vcard">Add Contact (vCard)</a>
  </body>
</html>
